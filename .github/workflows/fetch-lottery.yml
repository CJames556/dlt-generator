name: 自动获取大乐透开奖数据

on:
  # 定时触发：大乐透每周一三六开奖（北京时间21:15）
  # 北京时间 22:30 = UTC 14:30，23:30 再跑一次兜底
  schedule:
    - cron: '30 14 * * 1,3,6'   # 北京时间 周一/三/六 22:30
    - cron: '30 15 * * 1,3,6'   # 北京时间 周一/三/六 23:30
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 获取开奖数据
        id: fetch
        run: python fetch_lottery.py

      - name: 检查数据是否更新
        id: check
        run: |
          if git diff --quiet lottery_data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "数据未变化，跳过提交"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "检测到新数据，准备提交"
          fi

      - name: 提交更新
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lottery_data.json
          git commit -m "auto: 更新大乐透开奖数据 $(date -u -d '+8 hours' '+%Y-%m-%d %H:%M') BJT"
          git push
